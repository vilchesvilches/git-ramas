<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>GIT-Ramas</title>
</head>

<body>
    
    <div class="min-h-screen flex items-center bg-cover bg-center bg-no-repeat bg-[url('https://wallpaper.forfun.com/fetch/05/056f1a7269738cd2edc364c0d3ac2817.jpeg')]">        
        
        <div class="w-full lg:w-1/2 flex items-center justify-center p-8 sm:p-12">
            <div class="w-full max-w-md">

                <div class="mb-10 text-center lg:text-left">
                    <h2 class="text-3xl font-bold text-white">Bienvenido</h2>
                    <p class="text-white mt-2">Ingresa a tu cuenta para continuar.</p>
                </div>

                <button class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 text-gray-700 font-medium py-3 px-4 rounded-xl hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-1 transition-all mb-6 shadow-sm">
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    Continuar con Google
                </button>

                <div class="relative flex items-center mb-6">
                    <div class="flex-grow border-t border-gray-200"></div>
                    <span class="flex-shrink-0 mx-4 text-white text-sm">o ingresa con tu correo</span>
                    <div class="flex-grow border-t border-gray-200"></div>
                </div>

                <form action="#" method="POST" class="space-y-5">

                    <div>
                        <label for="email" class="block text-sm font-medium text-white mb-1">Correo Electrónico</label>
                        <input type="email" id="email" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all" placeholder="docente@universidad.edu" required>
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-white mb-1">Contraseña</label>
                        <input type="password" id="password" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all" placeholder="••••••••" required>
                    </div>

                    <div class="flex items-center justify-between pt-2">
                        <div class="flex items-center">
                            <input type="checkbox" id="remember" class="h-4 w-4 text-white focus:ring-indigo-500 border-gray-300 rounded cursor-pointer">
                            <label for="remember" class="ml-2 block text-sm text-white cursor-pointer">Recordarme</label>
                        </div>
                        <a href="#" class="text-sm text-indigo-600 hover:text-indigo-800 font-semibold transition-colors">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-3 px-4 rounded-xl hover:from-indigo-700 hover:to-purple-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 shadow-lg shadow-indigo-500/30 transform hover:-translate-y-0.5 transition-all duration-200">
                        Iniciar Sesión
                    </button>

                </form>

                <p class="mt-8 text-center text-sm text-white">
                    ¿No tienes una cuenta? <a href="#" class="text-indigo-600 hover:text-indigo-800 font-bold transition-colors">Regístrate ahora</a>
                </p>

            </div>
        </div>
    </div>

</body>
</html>
